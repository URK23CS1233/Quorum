version: "3.9"

# Optional production stores for Quorum.
# Default (no Docker) uses local LanceDB + NetworkX — zero config, works out of the box.
# Uncomment services here + matching env vars in backend/.env to upgrade to production stores.

services:
  neo4j:
    image: neo4j:5.20-community
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/quorum123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "quorum123", "RETURN 1"]
      interval: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: quorum
      POSTGRES_USER: quorum
      POSTGRES_PASSWORD: quorum123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quorum"]
      interval: 10s
      retries: 5

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
