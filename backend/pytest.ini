[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: `async def test_*` run without an explicit marker.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

addopts = -ra --strict-markers

# The app pins pydantic v2 / sqlalchemy 2 which emit migration warnings from
# third-party code we don't control; keep test output focused on real signal.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
